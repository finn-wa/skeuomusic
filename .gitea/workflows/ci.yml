name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          cache: true
          run_install: |
            - args: ["--frozen-lockfile"]

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Lint
        run: pnpm lint && pnpm fmt --check

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm --filter skeuomusic-react list playwright --json | jq -r '.[0].devDependencies.playwright.version')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6.0.0
        with:
          path: /root/.cache/ms-playwright
          key: playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter skeuomusic-react exec playwright install chromium --with-deps

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter skeuomusic-react exec playwright install-deps chromium

      - name: Test
        run: pnpm --recursive run test:ci

      - name: Upload test attachments
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: vitest-attachments
          path: packages/skeuomusic-react/.vitest-attachments/
          if-no-files-found: ignore
